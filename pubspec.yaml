name: flutter_ecommerce
description: Aplikasi E-Commerce Flutter dengan Supabase

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.1
  # Supabase Flutter SDK — pengganti SharedPreferences & backend
  supabase_flutter: ^2.5.6
  # UI & utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  badges: ^3.1.2
  fluttertoast: ^8.2.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
